name: "Lint"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
        - name: "Checkout the repository"
          uses: "actions/checkout@v6"

        - name: "Set up Python"
          uses: astral-sh/setup-uv@v3
          with:
            version: "latest"

        - name: "Ruff Checks"
          run: |
            uv tool run ruff format --check .
            uv tool run ruff check .
